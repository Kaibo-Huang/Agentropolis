<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GenAI Genesis — City Simulation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0d0f14;
        --surface: #161a22;
        --border: #2a3140;
        --muted: #6b7280;
        --text: #e6e9ef;
        --accent: #7dd3c0;
        --accent-dim: #5aa896;
        --danger: #e07d7d;
        --warn: #e0c07d;
        --radius: 8px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Outfit", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      #app {
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0 0 0.25rem 0;
      }
      .subtitle {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 2rem;
      }
      .day-bar {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1.5rem;
        padding: 0.75rem 1rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-family: "JetBrains Mono", monospace;
      }
      .day-bar .day {
        font-weight: 600;
        color: var(--accent);
      }
      .day-bar .population {
        color: var(--muted);
        font-size: 0.85rem;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }
      button {
        font-family: inherit;
        font-size: 0.875rem;
        font-weight: 600;
        padding: 0.5rem 0.875rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      button:hover {
        background: #1e232d;
        border-color: var(--accent-dim);
      }
      button.primary {
        background: var(--accent);
        color: var(--bg);
        border-color: var(--accent);
      }
      button.primary:hover {
        background: var(--accent-dim);
        border-color: var(--accent-dim);
      }
      .metrics {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 0.75rem;
        margin-bottom: 2rem;
      }
      .metric {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.875rem 1rem;
      }
      .metric .label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        margin-bottom: 0.25rem;
      }
      .metric .value {
        font-family: "JetBrains Mono", monospace;
        font-weight: 600;
        font-size: 1.1rem;
      }
      .metric .bar-wrap {
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        margin-top: 0.5rem;
        overflow: hidden;
      }
      .metric .bar {
        height: 100%;
        border-radius: 2px;
        transition: width 0.3s ease;
      }
      .metric.economy .bar { background: #7dd3c0; }
      .metric.publicHealth .bar { background: #7dc0d3; }
      .metric.housingCost .bar { background: #d37dc0; }
      .metric.pollution .bar { background: #e0c07d; }
      .metric.publicOpinion .bar { background: #c07de0; }
      .events-section h2 {
        font-size: 0.9rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        margin: 0 0 0.75rem 0;
      }
      .events-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .event-btn {
        font-size: 0.8rem;
        padding: 0.4rem 0.65rem;
        text-align: left;
        max-width: 160px;
      }
      .event-btn .name { display: block; font-weight: 600; }
      .event-btn .desc { display: block; font-size: 0.7rem; color: var(--muted); margin-top: 0.15rem; }
      .log {
        margin-top: 2rem;
        padding: 1rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-family: "JetBrains Mono", monospace;
        font-size: 0.8rem;
        color: var(--muted);
        max-height: 200px;
        overflow-y: auto;
      }
      .log-entry { margin: 0.25rem 0; }
      .log-entry.event { color: var(--accent); }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/web.ts"></script>
  </body>
</html>
