<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090b" />
    <title>Agentropolis — Toronto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --background: #09090b;
        --foreground: #fafafa;
        --muted: #71717a;
        --muted-foreground: #a1a1aa;
        --border: rgba(255, 255, 255, 0.08);
        --card: rgba(24, 24, 27, 0.95);
        --card-foreground: #fafafa;
        --primary: #fafafa;
        --primary-foreground: #09090b;
        --radius: 0.625rem;
        --font-sans: "Inter", system-ui, sans-serif;
        --font-mono: "Geist Mono", ui-monospace, monospace;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: var(--font-sans);
        color: var(--foreground);
        background: var(--background);
        -webkit-font-smoothing: antialiased;
      }
      #canvas-container {
        position: fixed;
        inset: 0;
        z-index: 0;
      }
      #canvas-container canvas,
      #canvas-container > div {
        display: block;
        width: 100%;
        height: 100%;
      }
      /* HUD - top bar */
      #hud {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 1rem;
        pointer-events: none;
      }
      #hud > * {
        pointer-events: auto;
      }
      .hud-left {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .hud-title {
        font-size: 0.9375rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin: 0;
        margin-right: 0.5rem;
        color: var(--foreground);
      }
      .hud-controls {
        display: flex;
        align-items: center;
        gap: 0.25rem;
      }
      .btn {
        font-family: var(--font-sans);
        font-size: 0.8125rem;
        font-weight: 500;
        padding: 0.4rem 0.75rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--card);
        color: var(--card-foreground);
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
      }
      .btn:hover {
        background: rgba(39, 39, 42, 0.95);
        border-color: rgba(255, 255, 255, 0.12);
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .btn-primary {
        background: var(--primary);
        color: var(--primary-foreground);
        border-color: var(--primary);
      }
      .btn-primary:hover {
        background: #e4e4e7;
        border-color: #e4e4e7;
      }
      .btn-primary:disabled {
        background: var(--muted);
        border-color: var(--muted);
      }
      .kbd {
        font-family: var(--font-mono);
        font-size: 0.65rem;
        color: var(--muted-foreground);
        margin-left: 0.15rem;
      }
      /* Time - center */
      .hud-center {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        padding: 0.5rem 0;
      }
      .time-day {
        font-family: var(--font-mono);
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--foreground);
      }
      .time-pop {
        font-size: 0.75rem;
        color: var(--muted-foreground);
        margin-top: 0.15rem;
      }
      /* Stats - right */
      .hud-right {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .stat-pill {
        font-family: var(--font-mono);
        font-size: 0.7rem;
        padding: 0.25rem 0.5rem;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: calc(var(--radius) - 2px);
        color: var(--muted-foreground);
      }
      .stat-pill .label {
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-right: 0.25rem;
      }
      .stat-pill .value {
        color: var(--foreground);
        font-weight: 500;
      }
      /* Events panel - slide-up sheet */
      #events-sheet {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 20;
        max-height: 38vh;
        overflow-y: auto;
        background: var(--card);
        border-top: 1px solid var(--border);
        padding: 1rem 1.25rem;
        transform: translateY(100%);
        transition: transform 0.25s ease;
      }
      #events-sheet.open {
        transform: translateY(0);
      }
      #events-sheet h2 {
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted-foreground);
        margin: 0 0 0.5rem 0;
      }
      .event-input {
        display: flex;
        gap: 0.5rem;
        align-items: flex-start;
      }
      .event-input textarea {
        flex: 1;
        font-family: var(--font-sans);
        font-size: 0.75rem;
        padding: 0.4rem 0.6rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--background);
        color: var(--foreground);
        resize: vertical;
      }
      .log {
        margin-top: 0.5rem;
        padding: 0.4rem 0.6rem;
        background: var(--background);
        border-radius: calc(var(--radius) - 2px);
        font-family: var(--font-mono);
        font-size: 0.65rem;
        color: var(--muted-foreground);
        max-height: 80px;
        overflow-y: auto;
      }
      .log-entry {
        margin: 0.1rem 0;
      }
      /* Tweet panel - right sidebar */
      #tweet-panel {
        position: fixed;
        top: 3.5rem;
        right: 0;
        width: 280px;
        max-height: calc(100vh - 4rem);
        overflow-y: auto;
        z-index: 15;
        background: var(--card);
        border-left: 1px solid var(--border);
        padding: 0.75rem;
        pointer-events: auto;
      }
      #tweet-panel h2 {
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted-foreground);
        margin: 0 0 0.5rem 0;
      }
      .tweet {
        padding: 0.4rem 0;
        border-bottom: 1px solid var(--border);
        font-size: 0.7rem;
      }
      .tweet-author {
        font-weight: 600;
        color: var(--foreground);
        display: block;
        margin-bottom: 0.1rem;
      }
      .tweet-text {
        color: var(--muted-foreground);
        display: block;
      }
      .tweet-time {
        font-family: var(--font-mono);
        font-size: 0.6rem;
        color: var(--muted);
        display: block;
        margin-top: 0.1rem;
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>
    <header id="hud">
      <div class="hud-left">
        <h1 class="hud-title">Toronto</h1>
        <div class="hud-controls">
          <button type="button" class="btn btn-primary" id="btn-step" disabled>
            Tick +1h
            <span class="kbd">Space</span>
          </button>
          <button type="button" class="btn" id="btn-auto-run" disabled>
            Auto-Run
          </button>
          <button type="button" class="btn" id="btn-events">
            Events
            <span class="kbd">E</span>
          </button>
        </div>
      </div>
      <div class="hud-center">
        <div class="time-day" id="day-display">Loading...</div>
        <div class="time-pop" id="pop-display">Pop. --</div>
      </div>
      <div class="hud-right" id="stats">
        <span class="stat-pill">
          <span class="label">Status</span>
          <span class="value" id="status-value">Init</span>
        </span>
      </div>
    </header>
    <aside id="tweet-panel">
      <h2>Latest Posts</h2>
      <div id="tweets-list"></div>
    </aside>
    <div id="events-sheet">
      <h2>Inject Event</h2>
      <div class="event-input">
        <textarea
          id="event-textarea"
          placeholder="Describe a city event (max 1000 chars)..."
          maxlength="1000"
          rows="3"
        ></textarea>
        <button type="button" class="btn btn-primary" id="btn-event-submit">
          Inject
        </button>
      </div>
      <div class="log" id="log"></div>
    </div>
    <script type="module" src="/src/web.ts"></script>
  </body>
</html>
